<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training Calendar</title>
</head>
<body>

<div class="item">
  <div class="item-header d-flex align-items-center">
    <div class="filter d-flex align-items-center">
      Filter by
    </div>
    <div class="searchBox">
      <input type="text" placeholder="Search by course name" id="courseSearch">
    </div>
    <div class="searchByTrain d-flex">
      <select name="month" id="monthDropdown">
        <option value="">All Months</option>
      </select>

      <select name="trainer" id="trainerDropdown">
        <option value="">All Trainers</option>
      </select>
    </div>
  </div>
  <div class="item-body">
    <table>
      <thead>
        <tr>
          <th>Course Name</th>
          <th>Date-Time</th>
          <th>Instructor</th>
          <th>Mode</th>
          <th>Batch Type</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  const currentMonth = new Date().toLocaleString('default', { month: 'long' }).toLowerCase();

  // Fetch data from the API
  async function fetchCalendarData() {
    const response = await fetch("https://azpirantz.com/registration/api/calander_list.php");
    const data = await response.json();
    return data;
  }

  // Populate the table
  function populateTable(data) {
    const tbody = document.querySelector("table tbody");
    tbody.innerHTML = ""; // Clear the table first

    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6">No data available</td></tr>`;
      return;
    }

    data.forEach((item) => {
      const row = document.createElement("tr");
      row.classList.add("d-flex", "align-items-center");

      row.innerHTML = `
        <td data-label="name">${item.course_name}</td>
        <td data-label="date-time">
          <span>${item.bsd_nf} - ${item.bed_nf}</span>
          <span>${item.slot_timing_start} - ${item.slot_timing_end} IST</span>
        </td>
        <td data-label="instructor">
          <span>${item.trainer_name}</span>
        </td>
        <td data-label="training-mode">${item.on_linesite}</td>
        <td data-label="batch-type">${item.batch_type}</td>
        <td data-label="batch-status">
          <button>${item.batch_status}</button>
        </td>
      `;
      tbody.appendChild(row);
    });
  }

  // Populate dropdowns
  function populateDropdowns(data) {
    const monthsSet = new Set();
    const trainersSet = new Set();

    data.forEach((item) => {
      const month = new Date(item.bsd_nf).toLocaleString("default", { month: "long" }).toLowerCase();
      monthsSet.add(month);
      trainersSet.add(item.trainer_name);
    });

    // Populate months dropdown in ascending order
    const monthDropdown = document.querySelector('#monthDropdown');
    monthDropdown.innerHTML = `<option value="">All Months</option>`;
    Array.from(monthsSet).sort().forEach((month) => {
      const option = document.createElement("option");
      option.value = month;
      option.text = month.charAt(0).toUpperCase() + month.slice(1);
      monthDropdown.appendChild(option);
    });

    // Populate trainers dropdown in descending order
    const trainerDropdown = document.querySelector('#trainerDropdown');
    trainerDropdown.innerHTML = `<option value="">All Trainers</option>`;
    Array.from(trainersSet).sort().reverse().forEach((trainer) => {
      const option = document.createElement("option");
      option.value = trainer;
      option.text = trainer;
      trainerDropdown.appendChild(option);
    });
  }

  // Find data for the current or next available month
  function findNextMonthData(data, currentMonth) {
    const currentMonthData = data.filter(item => {
      const itemMonth = new Date(item.bsd_nf).toLocaleString("default", { month: "long" }).toLowerCase();
      return itemMonth === currentMonth;
    });

    if (currentMonthData.length > 0) {
      return currentMonthData;
    }

    // Find data for the next available month if current month data is not available
    const sortedData = data.slice().sort((a, b) => new Date(a.bsd_nf) - new Date(b.bsd_nf));
    return sortedData.filter(item => new Date(item.bsd_nf) > new Date());
  }

  // Handle filter search
  function handleSearch() {
    const courseName = document.querySelector("#courseSearch").value.toLowerCase();
    const trainer = document.querySelector('#trainerDropdown').value.toLowerCase();
    const month = document.querySelector('#monthDropdown').value.toLowerCase();

    fetchCalendarData().then((data) => {
      let filteredData = data;

      // Filter independently by course name, trainer, or month
      if (courseName) {
        filteredData = filteredData.filter(item => item.course_name.toLowerCase().includes(courseName));
      }
      if (trainer) {
        filteredData = filteredData.filter(item => item.trainer_name.toLowerCase() === trainer);
      }
      if (month) {
        filteredData = filteredData.filter(item => new Date(item.bsd_nf).toLocaleString("default", { month: "long" }).toLowerCase() === month);
      }

      populateTable(filteredData);
    });
  }

  // Event listeners for search and dropdowns
  document.querySelector("#courseSearch").addEventListener("input", handleSearch);
  document.querySelector("#trainerDropdown").addEventListener("change", handleSearch);
  document.querySelector("#monthDropdown").addEventListener("change", handleSearch);

  // Initial data fetch on page load
  fetchCalendarData().then((data) => {
    const currentMonthData = findNextMonthData(data, currentMonth);
    populateDropdowns(data); // Populate the dropdowns
    populateTable(currentMonthData); // Show current month's data or next available month
  });

</script>

</body>
</html>
